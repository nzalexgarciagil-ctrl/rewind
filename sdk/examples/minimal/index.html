<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rewind Demo</title>
    <!-- CSInterface is required for CEP extensions -->
    <script src="rewind-sdk/cep/CSInterface.js"></script>
</head>
<body style="margin:0; height:100vh; overflow:hidden;">

    <!-- This div will contain the entire Rewind UI -->
    <div id="rewind-panel" style="height:100%;"></div>

    <!-- Include the Rewind SDK (single script tag!) -->
    <script src="rewind-sdk/rewind.js"></script>

    <script>
        // That's it! Two lines to add full version control to your extension:
        RewindSDK.init({ autoSaveInterval: 60 });
        RewindSDK.mountUI('#rewind-panel');
    </script>

</body>
</html>
