<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://api.github.com https://*.githubusercontent.com; img-src 'self' data: https://*.githubusercontent.com;">
    <title>Rewind</title>
</head>
<body style="margin:0; height:100vh; overflow:hidden;">

    <!-- Rewind UI mounts here -->
    <div id="rewind-panel" style="height:100%;"></div>

    <!-- Load CSInterface first (required by CEP) -->
    <script src="js/cep/CSInterface.js"></script>

    <!-- Load Rewind SDK (single script!) -->
    <script src="sdk/rewind.js"></script>

    <!-- Initialize and mount -->
    <script>
        // Two lines. That's it.
        RewindSDK.init({ autoSaveInterval: 60 });
        RewindSDK.mountUI('#rewind-panel');
    </script>

</body>
</html>
